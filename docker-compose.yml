services:
  mperf-db:
    image: mysql:8.0
    platform: linux/amd64
    container_name: mperf-db
    restart: always
    networks:
      - mperf-net
    environment:
      MYSQL_DATABASE: sarlog
      MYSQL_ROOT_PASSWORD: password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ../mperf_db.sql:/docker-entrypoint-initdb.d/01-schema.sql

  mperf-app:
    build:
      context: .
      dockerfile: Dockerfile
    platform: linux/amd64
    hostname: mperf-app
    restart: always
    networks:
      - mperf-net
    deploy:
      replicas: 2
      resources:
        limits:
          memory: 4G
    shm_size: '4gb'

    environment:
      - DATABASE_URL=mysql://root:password@mperf-db:3306/sarlog
      - NEXTAUTH_SECRET=y0ur_sup3r_s3cr3t_s3ssi0n_k3y
      - NEXTAUTH_URL=http://10.4.179.130
    depends_on:
      - mperf-db
    volumes:
      - ./data_RedHat:/app/data_RedHat
      - ./data_Solaris:/app/data_Solaris

  nginx:
    image: nginx:alpine
    container_name: mperf-nginx
    restart: always
    networks:
      - mperf-net
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
      - ./public:/usr/share/nginx/html:ro
    depends_on:
      - mperf-app

networks:
  mperf-net:
    driver: bridge

volumes:
  mysql_data:



