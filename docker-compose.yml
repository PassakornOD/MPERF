services:
  mperf-db:
    image: mysql:8.0
    container_name: mperf-db
    restart: always
    networks:
      - mperf-net
    environment:
      MYSQL_DATABASE: sarlog
      MYSQL_ROOT_PASSWORD: password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ../sarlog.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ../data_user_hg_hn.sql:/docker-entrypoint-initdb.d/02-data_users.sql
      - ../data_bss.sql:/docker-entrypoint-initdb.d/03-data_bss.sql
      - ../data_tux.sql:/docker-entrypoint-initdb.d/04-data_tux.sql

  mperf-app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: always
    networks:
      - mperf-net
    deploy:
      replicas: 2
    environment:
      - DATABASE_URL=mysql://root:password@mperf-db:3306/sarlog
      - NEXTAUTH_SECRET=y0ur_sup3r_s3cr3t_s3ssi0n_k3y
      - NEXTAUTH_URL=http://mperf-app:3000
    depends_on:
      - mperf-db
    volumes:
      - ./data_RedHat:/app/data_RedHat
      - ./data_Solaris:/app/data_Solaris

  nginx:
    image: nginx:alpine
    container_name: mperf-nginx
    restart: always
    networks:
      - mperf-net
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - mperf-app

networks:
  mperf-net:
    driver: bridge

volumes:
  mysql_data:



